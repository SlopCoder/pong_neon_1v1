<style>
  html, body { background: #0a0014 !important; margin: 0; padding: 0; }
  .sr-only { position: absolute !important; width: 1px !important; height: 1px !important; padding: 0 !important; margin: -1px !important; overflow: hidden !important; clip: rect(0,0,0,0) !important; white-space: nowrap !important; border: 0 !important; }
  .pong-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 1.5rem 1rem;
    background: #0a0014;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .pong-canvas { display: block; background: #0a0014; border-radius: 8px; width: 100%; max-width: 680px; height: auto; aspect-ratio: 8/5; outline: none; cursor: pointer; }
  .pong-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; min-height: 36px; }
  .pong-btn {
    font-family: "Courier New", monospace;
    font-size: 13px; font-weight: bold; letter-spacing: 0.5px;
    padding: 7px 18px;
    border: 1.5px solid #3a1a5e;
    border-radius: 6px;
    background: rgba(20, 5, 40, 0.9);
    color: #c0b0e0;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .pong-btn:hover {
    border-color: #00e5ff; color: #ffffff;
    background: rgba(0, 229, 255, 0.08);
    box-shadow: 0 0 12px rgba(0, 229, 255, 0.3), inset 0 0 8px rgba(0, 229, 255, 0.05);
  }
  .pong-btn:active { transform: scale(0.96); background: rgba(0, 229, 255, 0.15); }
  .pong-btn.accent:hover {
    border-color: #ff2e9a;
    background: rgba(255, 46, 154, 0.08);
    box-shadow: 0 0 12px rgba(255, 46, 154, 0.3), inset 0 0 8px rgba(255, 46, 154, 0.05);
  }
  .pong-btn.accent:active { background: rgba(255, 46, 154, 0.15); }
  .pong-btn.hidden { opacity: 0; pointer-events: none; }
</style>

<h2 class="sr-only">Interactive neon Pong</h2>

<div class="pong-wrap">
  <canvas id="pong" width="800" height="500" class="pong-canvas" tabindex="0"></canvas>
  <div class="pong-controls">
    <button class="pong-btn hidden" id="pong-pause">⏸ Pause</button>
    <button class="pong-btn accent" id="pong-menu">⟨ Menu</button>
    <button class="pong-btn" id="pong-mute">♫ Sound: on</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('pong');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const pauseBtn = document.getElementById('pong-pause');

  const C = {
    bg: '#0a0014', grid: '#1a0a2e', centerLine: '#3a1a5e',
    left: '#ff2e9a', right: '#00e5ff', ball: '#ffffff', text: '#ffffff',
    dim: '#7a6a99', easy: '#3eff8a', medium: '#00e5ff', hard: '#ff2e9a'
  };

  let state = 'menu';
  let mode = null, difficulty = 'medium';
  let countdownStart = 0, winner = null, muted = false;

  const paddleW = 12, paddleH = 88;
  const left  = { x: 30, y: H/2 - paddleH/2, score: 0 };
  const right = { x: W - 30 - paddleW, y: H/2 - paddleH/2, score: 0 };
  const ball  = { x: W/2, y: H/2, vx: 0, vy: 0, trail: [] };

  const paddleSpeed = 540;
  const baseBallSpeed = 400;
  const maxBallSpeed  = 880;
  const WIN_SCORE = 10;

  let botTargetY = H/2, lastBallVx = 0;
  let rallyHits = 0, longestRally = 0;

  const particles = [];
  let shake = 0, pulseL = 0, pulseR = 0, serveFlash = 0;

  const keys = {};
  let mouseY = -1;
  let audioCtx = null;

  function updatePauseBtn() {
    const inGame = state==='playing'||state==='paused'||state==='countdown'||state==='gameover';
    pauseBtn.classList.toggle('hidden', !inGame);
  }

  function ensureAudio() {
    if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function synth(freq, dur, type='square', vol=0.07, attack=0.005) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + dur);
  }
  function sfxPaddleHit(i) { synth(300+i*200,0.06,'square',0.09); synth(600+i*300,0.04,'sine',0.05); }
  function sfxWallBounce() { synth(180,0.04,'triangle',0.04); }
  function sfxScore(s) { const b=s==='left'?520:440; synth(b,0.12,'sine',0.1); setTimeout(()=>synth(b*0.75,0.12,'sine',0.08),80); setTimeout(()=>synth(b*0.5,0.2,'sine',0.06),160); }
  function sfxCountdown() { synth(880,0.08,'sine',0.06); }
  function sfxGo() { synth(880,0.06,'sine',0.08); setTimeout(()=>synth(1320,0.12,'sine',0.08),60); }
  function sfxWin() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>synth(f,0.2,'sine',0.09),i*120)); }
  function sfxClick() { synth(1200,0.03,'sine',0.04); synth(1600,0.02,'square',0.02); }

  function spawnParticles(x, y, color, count, speed, life) {
    for (let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=speed*(0.5+Math.random());particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life*(0.6+Math.random()*0.4),maxLife:life,color,size:2+Math.random()*2.5});}
  }

  function resetBall(direction) {
    if(rallyHits>longestRally) longestRally=rallyHits;
    rallyHits=0; ball.x=W/2; ball.y=H/2;
    const angle=(Math.random()-0.5)*0.6;
    ball.vx=direction*baseBallSpeed*Math.cos(angle); ball.vy=baseBallSpeed*Math.sin(angle);
    ball.trail=[]; botTargetY=H/2; lastBallVx=0; serveFlash=0.4;
  }

  function startGame(m, d) {
    mode=m; difficulty=d||'medium';
    left.score=0; right.score=0;
    left.y=H/2-paddleH/2; right.y=H/2-paddleH/2;
    rallyHits=0; longestRally=0;
    resetBall(Math.random()<0.5?-1:1);
    state='countdown'; countdownStart=performance.now();
    particles.length=0; shake=0; pulseL=0; pulseR=0;
    lastCountdownNum=4; updatePauseBtn(); canvas.focus();
  }

  function togglePause() { if(state==='playing') state='paused'; else if(state==='paused') state='playing'; }

  function predictLanding(maxBounces) {
    if(ball.vx>=0) return H/2;
    const t=(ball.x-(left.x+paddleW))/-ball.vx;
    let py=ball.y+ball.vy*t, bounces=0;
    while((py<0||py>H)&&bounces<maxBounces){if(py<0)py=-py;if(py>H)py=2*H-py;bounces++;}
    return py;
  }

  function updateBot(dt) {
    const towardBot = ball.vx < 0;
    if (difficulty==='easy') {
      const speed=300, center=left.y+paddleH/2, diff=ball.y-center;
      if(Math.abs(diff)>6) left.y+=Math.sign(diff)*Math.min(speed*dt,Math.abs(diff));
    } else if (difficulty==='medium') {
      const speed=470;
      if(towardBot&&lastBallVx>=0) botTargetY=predictLanding(1)+(Math.random()-0.5)*50;
      else if(!towardBot&&lastBallVx<0) botTargetY=H/2;
      const center=left.y+paddleH/2, diff=botTargetY-center;
      if(Math.abs(diff)>3) left.y+=Math.sign(diff)*Math.min(speed*dt,Math.abs(diff));
    } else {
      const speed=520;
      if(towardBot&&lastBallVx>=0) botTargetY=predictLanding(20)+(Math.random()-0.5)*60;
      else if(towardBot){const pred=predictLanding(20);botTargetY=botTargetY*0.92+pred*0.08;}
      else botTargetY=H/2;
      const center=left.y+paddleH/2, diff=botTargetY-center;
      if(Math.abs(diff)>3) left.y+=Math.sign(diff)*Math.min(speed*dt,Math.abs(diff));
    }
    lastBallVx=ball.vx;
    left.y=Math.max(0,Math.min(H-paddleH,left.y));
  }

  function handlePaddleHit(paddle, isLeft) {
    const hitPos=(ball.y-(paddle.y+paddleH/2))/(paddleH/2);
    const clamped=Math.max(-1,Math.min(1,hitPos));
    const angle=clamped*(Math.PI/3.5);
    const speed=Math.min(maxBallSpeed,Math.hypot(ball.vx,ball.vy)*1.06);
    const dir=ball.vx>0?-1:1;
    ball.vx=dir*speed*Math.cos(angle); ball.vy=speed*Math.sin(angle);
    rallyHits++; sfxPaddleHit(Math.abs(clamped));
    spawnParticles(ball.x,ball.y,isLeft?C.left:C.right,12,300,0.5);
    shake=Math.max(shake,5);
  }

  function checkWin() {
    if(left.score>=WIN_SCORE){winner=mode==='pvp'?'Player 1':'Bot';state='gameover';if(rallyHits>longestRally)longestRally=rallyHits;sfxWin();updatePauseBtn();}
    else if(right.score>=WIN_SCORE){winner=mode==='pvp'?'Player 2':'You';state='gameover';if(rallyHits>longestRally)longestRally=rallyHits;sfxWin();updatePauseBtn();}
  }

  function stepBall(dt) {
    const steps=Math.max(1,Math.ceil(Math.hypot(ball.vx*dt,ball.vy*dt)/6));
    const sd=dt/steps;
    for(let i=0;i<steps;i++){
      ball.x+=ball.vx*sd; ball.y+=ball.vy*sd;
      if(ball.y<8){ball.y=8;ball.vy=Math.abs(ball.vy);sfxWallBounce();spawnParticles(ball.x,8,'#fff',4,180,0.3);}
      if(ball.y>H-8){ball.y=H-8;ball.vy=-Math.abs(ball.vy);sfxWallBounce();spawnParticles(ball.x,H-8,'#fff',4,180,0.3);}
      if(ball.vx<0&&ball.x-8<left.x+paddleW&&ball.x+8>left.x&&ball.y+8>left.y&&ball.y-8<left.y+paddleH){ball.x=left.x+paddleW+8;handlePaddleHit(left,true);}
      if(ball.vx>0&&ball.x+8>right.x&&ball.x-8<right.x+paddleW&&ball.y+8>right.y&&ball.y-8<right.y+paddleH){ball.x=right.x-8;handlePaddleHit(right,false);}
      if(ball.x<-20){right.score++;pulseR=1;sfxScore('left');spawnParticles(20,ball.y,C.left,30,320,0.9);shake=14;checkWin();if(state==='playing'){resetBall(-1);state='countdown';countdownStart=performance.now();lastCountdownNum=4;}return;}
      else if(ball.x>W+20){left.score++;pulseL=1;sfxScore('right');spawnParticles(W-20,ball.y,C.right,30,320,0.9);shake=14;checkWin();if(state==='playing'){resetBall(1);state='countdown';countdownStart=performance.now();lastCountdownNum=4;}return;}
    }
  }

  function updatePlaying(dt) {
    if(mode==='pvp'){if(keys['w'])left.y-=paddleSpeed*dt;if(keys['s'])left.y+=paddleSpeed*dt;if(keys['arrowup'])right.y-=paddleSpeed*dt;if(keys['arrowdown'])right.y+=paddleSpeed*dt;}
    else{updateBot(dt);if(keys['arrowup']||keys['w'])right.y-=paddleSpeed*dt;if(keys['arrowdown']||keys['s'])right.y+=paddleSpeed*dt;}
    left.y=Math.max(0,Math.min(H-paddleH,left.y)); right.y=Math.max(0,Math.min(H-paddleH,right.y));
    ball.trail.push({x:ball.x,y:ball.y}); if(ball.trail.length>14)ball.trail.shift();
    stepBall(dt);
  }

  function updateEffects(dt) {
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.94;p.vy*=0.94;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
    shake=Math.max(0,shake-dt*35);pulseL=Math.max(0,pulseL-dt*2.2);pulseR=Math.max(0,pulseR-dt*2.2);serveFlash=Math.max(0,serveFlash-dt*1.5);
  }

  function drawBg() {
    ctx.fillStyle=C.bg;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=C.grid;ctx.lineWidth=1;
    for(let i=0;i<=W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
    for(let i=0;i<=H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
    ctx.strokeStyle=C.centerLine;ctx.lineWidth=3;ctx.setLineDash([10,14]);ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  }

  function drawCornerBrackets() {
    ctx.strokeStyle=C.dim;ctx.lineWidth=2;const s=18;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,dx,dy])=>{ctx.beginPath();ctx.moveTo(x+dx*s,y);ctx.lineTo(x,y);ctx.lineTo(x,y+dy*s);ctx.stroke();});
  }

  function drawScore() {
    ctx.font='bold 56px "Courier New", monospace';
    [{s:left.score,p:pulseL,xo:-50,c:C.left,a:'right'},{s:right.score,p:pulseR,xo:50,c:C.right,a:'left'}].forEach(d=>{
      const sc=1+d.p*0.5;ctx.save();ctx.translate(W/2+d.xo,78);ctx.scale(sc,sc);
      ctx.fillStyle=d.p>0.05?d.c:C.text;ctx.textAlign=d.a;ctx.fillText(String(d.s),0,0);ctx.restore();
    });
  }

  function drawHud() {
    ctx.font='13px "Courier New", monospace';
    if(mode==='bot'){ctx.textAlign='left';ctx.fillStyle=C[difficulty]||C.dim;ctx.fillText('● bot · '+difficulty,12,H-14);ctx.fillStyle=C.dim;ctx.textAlign='right';ctx.fillText('you  ↑/↓',W-12,H-14);}
    else{ctx.fillStyle=C.dim;ctx.textAlign='left';ctx.fillText('P1  W/S',12,H-14);ctx.textAlign='right';ctx.fillText('P2  ↑/↓',W-12,H-14);}
    if(rallyHits>2&&state==='playing'){ctx.textAlign='center';ctx.fillStyle=C.dim;ctx.font='12px "Courier New", monospace';ctx.fillText('rally · '+rallyHits,W/2,H-14);}
    const mp=(left.score===WIN_SCORE-1||right.score===WIN_SCORE-1)&&left.score!==right.score;
    if(mp){const t=performance.now();ctx.fillStyle=left.score===WIN_SCORE-1?C.left:C.right;ctx.globalAlpha=0.6+Math.sin(t/200)*0.4;ctx.font='bold 14px "Courier New", monospace';ctx.textAlign='center';ctx.fillText('▲ MATCH POINT ▲',W/2,110);ctx.globalAlpha=1;}
  }

  function drawParticles() {for(const p of particles){const a=Math.max(0,p.life/p.maxLife);ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}

  function drawGame() {
    ctx.shadowBlur=22;ctx.shadowColor=C.left;ctx.fillStyle=C.left;ctx.fillRect(left.x,left.y,paddleW,paddleH);
    ctx.shadowColor=C.right;ctx.fillStyle=C.right;ctx.fillRect(right.x,right.y,paddleW,paddleH);ctx.shadowBlur=0;
    for(let i=0;i<ball.trail.length;i++){const t=ball.trail[i],f=i/ball.trail.length;ctx.globalAlpha=f*0.4;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(t.x,t.y,7*f,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;ctx.shadowBlur=22;ctx.shadowColor='#fff';ctx.fillStyle=C.ball;ctx.beginPath();ctx.arc(ball.x,ball.y,8,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    if(serveFlash>0){ctx.globalAlpha=serveFlash;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,30*(1-serveFlash+0.2),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    drawParticles();
  }

  const menuRegions = {
    menu:[{y1:252,y2:308,action:'bot'},{y1:318,y2:374,action:'pvp'}],
    difficulty:[{y1:200,y2:255,action:'easy'},{y1:268,y2:323,action:'medium'},{y1:336,y2:391,action:'hard'}],
    gameover:[{y1:296,y2:336,action:'rematch'},{y1:351,y2:391,action:'menu'}]
  };
  function isHovered(r){return mouseY>=r.y1&&mouseY<=r.y2;}

  function drawMenu() {
    const t=performance.now(),bob=Math.sin(t/900)*3,pulse=(Math.sin(t/600)+1)/2;
    ctx.textAlign='center';ctx.shadowBlur=22+pulse*18;ctx.shadowColor=C.left;ctx.fillStyle='#fff';
    ctx.font='bold 92px "Courier New", monospace';ctx.fillText('PONG',W/2,145+bob);ctx.shadowBlur=0;
    ctx.fillStyle=C.right;ctx.font='20px "Courier New", monospace';ctx.fillText('— choose your mode —',W/2,200);
    [{text:'[1]  1 player  vs  bot',y:285,r:menuRegions.menu[0],c:C.right},{text:'[2]  2 players  local',y:350,r:menuRegions.menu[1],c:C.left}].forEach(item=>{
      const hov=isHovered(item.r);ctx.font='bold 26px "Courier New", monospace';ctx.textAlign='center';
      if(hov){ctx.fillStyle=item.c;ctx.shadowBlur=14;ctx.shadowColor=item.c;ctx.fillText('▸  '+item.text+'  ◂',W/2,item.y);ctx.shadowBlur=0;}
      else{ctx.fillStyle='#fff';ctx.fillText(item.text,W/2,item.y);}
    });
    ctx.fillStyle=C.dim;ctx.font='14px "Courier New", monospace';ctx.textAlign='center';ctx.fillText('press a number key or click',W/2,H-38);
  }

  function drawDifficulty() {
    ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 38px "Courier New", monospace';ctx.fillText('select difficulty',W/2,130);
    [{key:'[1]',name:'EASY',color:C.easy,y:230,r:menuRegions.difficulty[0]},{key:'[2]',name:'MEDIUM',color:C.medium,y:298,r:menuRegions.difficulty[1]},{key:'[3]',name:'HARD',color:C.hard,y:366,r:menuRegions.difficulty[2]}].forEach(item=>{
      const hov=isHovered(item.r);ctx.font='bold 28px "Courier New", monospace';ctx.textAlign='center';
      if(hov){ctx.fillStyle='#fff';ctx.shadowBlur=16;ctx.shadowColor=item.color;ctx.fillText('▸  '+item.key+'  '+item.name+'  ◂',W/2,item.y);ctx.shadowBlur=0;}
      else{ctx.fillStyle=item.color;ctx.fillText(item.key+'  '+item.name,W/2,item.y);}
    });
    ctx.fillStyle=C.dim;ctx.font='14px "Courier New", monospace';ctx.textAlign='center';ctx.fillText('press 1, 2, 3  ·  esc to go back',W/2,H-38);
  }

  let lastCountdownNum=4;
  function drawCountdown() {
    const elapsed=(performance.now()-countdownStart)/1000,num=Math.ceil(3-elapsed);
    if(num<=0){sfxGo();state='playing';return;}
    if(num<lastCountdownNum){sfxCountdown();lastCountdownNum=num;}
    const frac=num-(3-elapsed);ctx.globalAlpha=Math.min(1,frac*2);ctx.fillStyle='#fff';
    ctx.font='bold '+(130+(1-frac)*30)+'px "Courier New", monospace';ctx.textAlign='center';
    ctx.shadowBlur=30;ctx.shadowColor=C.right;ctx.fillText(String(num),W/2,H/2+45);ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  function drawPause() {
    ctx.fillStyle='rgba(10,0,20,0.72)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 56px "Courier New", monospace';
    ctx.textAlign='center';ctx.fillText('PAUSED',W/2,H/2-10);ctx.font='16px "Courier New", monospace';ctx.fillStyle=C.right;
    ctx.fillText('press space to resume',W/2,H/2+30);ctx.fillStyle=C.dim;ctx.fillText('rally · '+rallyHits+'   ·   longest · '+longestRally,W/2,H/2+60);
  }

  function drawGameOver() {
    ctx.fillStyle='rgba(10,0,20,0.9)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';
    const wc=(winner==='You'||winner==='Player 2')?C.right:C.left;
    ctx.shadowBlur=28;ctx.shadowColor=wc;ctx.fillStyle='#fff';ctx.font='bold 56px "Courier New", monospace';ctx.fillText(winner+' wins!',W/2,145);ctx.shadowBlur=0;
    ctx.font='bold 38px "Courier New", monospace';ctx.fillStyle='#fff';ctx.fillText(left.score+'   —   '+right.score,W/2,200);
    ctx.font='15px "Courier New", monospace';ctx.fillStyle=C.dim;ctx.fillText('longest rally · '+longestRally+' hits',W/2,240);
    [{text:'[R]  rematch',y:320,r:menuRegions.gameover[0],c:C.right},{text:'[M]  main menu',y:375,r:menuRegions.gameover[1],c:C.left}].forEach(item=>{
      const hov=isHovered(item.r);ctx.font='bold 24px "Courier New", monospace';ctx.textAlign='center';
      if(hov){ctx.fillStyle=item.c;ctx.shadowBlur=12;ctx.shadowColor=item.c;ctx.fillText('▸  '+item.text+'  ◂',W/2,item.y);ctx.shadowBlur=0;}
      else{ctx.fillStyle='#fff';ctx.fillText(item.text,W/2,item.y);}
    });
  }

  function render() {
    const sx=(Math.random()-0.5)*shake,sy=(Math.random()-0.5)*shake;ctx.save();ctx.translate(sx,sy);drawBg();
    if(state==='menu'){drawCornerBrackets();drawMenu();ctx.restore();return;}
    if(state==='difficulty'){drawCornerBrackets();drawDifficulty();ctx.restore();return;}
    drawScore();drawHud();drawGame();
    if(state==='countdown')drawCountdown();if(state==='paused')drawPause();if(state==='gameover')drawGameOver();
    ctx.restore();
  }

  let lastTime=performance.now();
  function loop(now){const dt=Math.min(0.05,(now-lastTime)/1000);lastTime=now;if(state==='playing')updatePlaying(dt);updateEffects(dt);render();requestAnimationFrame(loop);}

  window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;if(['arrowup','arrowdown','w','s',' '].includes(k))e.preventDefault();ensureAudio();
    if(k===' '){togglePause();return;}
    if(state==='menu'){if(k==='1'){sfxClick();state='difficulty';updatePauseBtn();}else if(k==='2'){sfxClick();startGame('pvp');}}
    else if(state==='difficulty'){if(k==='1'){sfxClick();startGame('bot','easy');}else if(k==='2'){sfxClick();startGame('bot','medium');}else if(k==='3'){sfxClick();startGame('bot','hard');}else if(k==='escape'||k==='backspace'){sfxClick();state='menu';updatePauseBtn();}}
    else if(state==='gameover'){if(k==='r'){sfxClick();startGame(mode,difficulty);}else if(k==='m'){sfxClick();state='menu';updatePauseBtn();}}
  });
  window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

  function canvasCoords(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
  canvas.addEventListener('mousemove',e=>{mouseY=canvasCoords(e).y;});
  canvas.addEventListener('mouseleave',()=>{mouseY=-1;});

  canvas.addEventListener('click',e=>{canvas.focus();ensureAudio();const{y}=canvasCoords(e);const regions=menuRegions[state];if(!regions)return;
    for(const r of regions){if(y>=r.y1&&y<=r.y2){sfxClick();const a=r.action;
      if(a==='bot'){state='difficulty';updatePauseBtn();}else if(a==='pvp')startGame('pvp');
      else if(a==='easy'||a==='medium'||a==='hard')startGame('bot',a);
      else if(a==='rematch')startGame(mode,difficulty);else if(a==='menu'){state='menu';updatePauseBtn();}return;}}
  });

  pauseBtn.addEventListener('click',()=>{togglePause();canvas.focus();});
  document.getElementById('pong-menu').addEventListener('click',()=>{sfxClick();state='menu';updatePauseBtn();canvas.focus();});
  document.getElementById('pong-mute').addEventListener('click',(e)=>{muted=!muted;e.target.textContent='♫ Sound: '+(muted?'off':'on');canvas.focus();});

  updatePauseBtn();setTimeout(()=>canvas.focus(),50);requestAnimationFrame(loop);
})();
</script>
